<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sơ đồ kiến trúc hệ thống quản lý thu chi</title>
  <style>
    :root {
      --paper: #fffde8;
      --panel: #fffbd0;
      --line: #c6c877;
      --ink: #202124;
      --muted: #4f5660;
      --blue: #e8f4ff;
      --blue-line: #7aa3c2;
      --green: #70c55b;
      --green-line: #1f5f1f;
      --orange: #ffc52b;
      --orange-line: #8a6a00;
      --teal: #1398aa;
      --teal-line: #075d6c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f4f1;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sheet {
      width: min(1600px, 100%);
      background: var(--paper);
      border: 1px solid #d6d99a;
      box-shadow: 0 16px 40px rgba(40, 45, 20, 0.14);
      overflow: auto;
    }

    .diagram {
      display: block;
      width: 1600px;
      height: 930px;
    }

    .layer {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 1.2;
    }

    .subtle {
      fill: #fff9c4;
      stroke: var(--line);
      stroke-width: 1;
    }

    .box {
      fill: var(--blue);
      stroke: var(--blue-line);
      stroke-width: 1.2;
    }

    .green {
      fill: var(--green);
      stroke: var(--green-line);
      stroke-width: 1.4;
    }

    .orange {
      fill: var(--orange);
      stroke: var(--orange-line);
      stroke-width: 1.4;
    }

    .teal {
      fill: var(--teal);
      stroke: var(--teal-line);
      stroke-width: 1.4;
    }

    text {
      font-family: Arial, Helvetica, sans-serif;
      fill: var(--ink);
    }

    .title {
      font-size: 15px;
      font-weight: 700;
    }

    .label {
      font-size: 14px;
      fill: #333;
    }

    .small {
      font-size: 13px;
    }

    .white {
      fill: #fff;
      font-weight: 700;
    }

    .arrow {
      fill: none;
      stroke: #222;
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }

    .arrow-thick {
      fill: none;
      stroke: #222;
      stroke-width: 3.2;
      marker-end: url(#arrow);
    }

    .arrow-dashed {
      fill: none;
      stroke: #333;
      stroke-width: 1.8;
      stroke-dasharray: 4 4;
      marker-end: url(#arrow);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet" aria-label="Sơ đồ kiến trúc hệ thống quản lý thu chi">
      <svg class="diagram" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 930" role="img">
        <title>Sơ đồ kiến trúc hệ thống quản lý thu chi</title>
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#222"></path>
          </marker>
        </defs>

        <rect x="0" y="0" width="1600" height="930" fill="#fffde8"></rect>

        <rect class="layer" x="35" y="30" width="1530" height="350"></rect>
        <text class="title" x="800" y="43" text-anchor="middle">Tầng Backend (Spring Boot REST API)</text>

        <path class="green" d="M930 56 C930 40,1095 40,1095 56 L1095 116 C1095 132,930 132,930 116 Z"></path>
        <ellipse class="green" cx="1012.5" cy="56" rx="82.5" ry="16"></ellipse>
        <path d="M930 116 C930 132,1095 132,1095 116" fill="none" stroke="#1f5f1f" stroke-width="1.4"></path>
        <text class="white" x="1012" y="83" text-anchor="middle" font-size="14">Spring Boot Server</text>
        <text class="white small" x="1012" y="103" text-anchor="middle">Java 21, Layered Arch</text>

        <rect class="box" x="720" y="175" width="118" height="48"></rect>
        <text x="779" y="194" text-anchor="middle" font-size="14">Spring Security</text>
        <text class="small" x="779" y="212" text-anchor="middle">FirebaseAuthFilter</text>

        <path class="arrow" d="M1010 132 C930 135,820 142,780 175"></path>

        <rect class="subtle" x="55" y="270" width="1175" height="90"></rect>
        <text class="label" x="620" y="282" text-anchor="middle">Các Controller và Service nghiệp vụ</text>

        <rect class="box" x="305" y="292" width="165" height="45"></rect>
        <text x="387" y="311" text-anchor="middle" font-size="14">Auth/User Service</text>
        <text class="small" x="387" y="328" text-anchor="middle">Sync Firebase User</text>

        <rect class="box" x="510" y="292" width="155" height="45"></rect>
        <text x="587" y="311" text-anchor="middle" font-size="14">Account Service</text>
        <text class="small" x="587" y="328" text-anchor="middle">Quản lý ví/tài khoản</text>

        <rect class="box" x="705" y="292" width="165" height="45"></rect>
        <text x="787" y="311" text-anchor="middle" font-size="14">Transaction Service</text>
        <text class="small" x="787" y="328" text-anchor="middle">Ghi chép thu chi</text>

        <rect class="box" x="910" y="292" width="150" height="45"></rect>
        <text x="985" y="311" text-anchor="middle" font-size="14">Budget Service</text>
        <text class="small" x="985" y="328" text-anchor="middle">Cảnh báo hạn mức</text>

        <rect class="box" x="1100" y="292" width="155" height="45"></rect>
        <text x="1177" y="311" text-anchor="middle" font-size="14">Report Service</text>
        <text class="small" x="1177" y="328" text-anchor="middle">Tổng hợp dữ liệu</text>

        <path class="arrow" d="M779 223 C730 245,510 250,388 292"></path>
        <path class="arrow" d="M779 223 C730 250,600 253,588 292"></path>
        <path class="arrow" d="M779 223 L787 292"></path>
        <path class="arrow" d="M779 223 C845 250,955 252,985 292"></path>
        <path class="arrow" d="M779 223 C900 245,1150 247,1177 292"></path>

        <rect class="layer" x="28" y="440" width="220" height="130"></rect>
        <text class="title" x="42" y="457">Tầng Cơ sở dữ liệu</text>
        <path class="teal" d="M70 478 C70 460,200 460,200 478 L200 525 C200 543,70 543,70 525 Z"></path>
        <ellipse class="teal" cx="135" cy="478" rx="65" ry="18"></ellipse>
        <path d="M70 525 C70 543,200 543,200 525" fill="none" stroke="#075d6c" stroke-width="1.4"></path>
        <text class="white" x="135" y="500" text-anchor="middle" font-size="14">MySQL Database</text>
        <text class="white small" x="135" y="518" text-anchor="middle">Spring Data JPA</text>

        <path class="arrow-thick" d="M135 380 L135 460"></path>
        <text class="label" x="66" y="428">5. Repository truy vấn/cập nhật</text>

        <rect class="layer" x="255" y="440" width="700" height="310"></rect>
        <text class="title" x="270" y="457">Dịch vụ Xác thực bên thứ ba</text>

        <path class="orange" d="M520 488 C520 468,695 468,695 488 L695 543 C695 563,520 563,520 543 Z"></path>
        <ellipse class="orange" cx="607.5" cy="488" rx="87.5" ry="20"></ellipse>
        <path d="M520 543 C520 563,695 563,695 543" fill="none" stroke="#8a6a00" stroke-width="1.4"></path>
        <text x="607" y="510" text-anchor="middle" font-size="14" font-weight="700">Firebase Authentication</text>
        <text class="small" x="607" y="529" text-anchor="middle">Quản lý đăng nhập và ID Token</text>

        <rect class="box" x="280" y="675" width="110" height="30"></rect>
        <text class="small" x="335" y="695" text-anchor="middle">Google Sign-In</text>

        <rect class="box" x="430" y="675" width="115" height="30"></rect>
        <text class="small" x="487" y="695" text-anchor="middle">Facebook Login</text>

        <rect class="box" x="590" y="675" width="120" height="30"></rect>
        <text class="small" x="650" y="695" text-anchor="middle">Email/Password</text>

        <path class="arrow" d="M335 675 C330 590,470 560,527 535"></path>
        <path class="arrow" d="M487 675 C485 590,540 570,565 552"></path>
        <path class="arrow" d="M650 675 C652 610,642 575,625 552"></path>

        <rect class="layer" x="995" y="630" width="570" height="230"></rect>
        <text class="title" x="1190" y="646">Tầng Client (Android App)</text>

        <path class="green" d="M1258 670 C1258 654,1360 654,1360 670 L1360 718 C1360 734,1258 734,1258 718 Z"></path>
        <ellipse class="green" cx="1309" cy="670" rx="51" ry="16"></ellipse>
        <path d="M1258 718 C1258 734,1360 734,1360 718" fill="none" stroke="#1f5f1f" stroke-width="1.4"></path>
        <text x="1309" y="692" text-anchor="middle" font-size="14" font-weight="700">Android App</text>
        <text class="small" x="1309" y="710" text-anchor="middle">Java, MVVM</text>

        <rect class="box" x="1030" y="792" width="175" height="48"></rect>
        <text class="small" x="1117" y="812" text-anchor="middle">Activity / Fragment</text>
        <text class="small" x="1117" y="830" text-anchor="middle">Obsidian-Dark UI</text>

        <rect class="box" x="1268" y="792" width="135" height="48"></rect>
        <text class="small" x="1335" y="812" text-anchor="middle">ViewModel</text>
        <text class="small" x="1335" y="830" text-anchor="middle">Repository</text>

        <rect class="box" x="1432" y="792" width="110" height="48"></rect>
        <text class="small" x="1487" y="812" text-anchor="middle">Retrofit</text>
        <text class="small" x="1487" y="830" text-anchor="middle">OkHttp</text>

        <path class="arrow" d="M1258 708 C1190 720,1118 730,1117 792"></path>
        <path class="arrow" d="M1309 734 L1335 792"></path>
        <path class="arrow" d="M1360 706 C1395 728,1400 770,1432 797"></path>

        <path class="arrow-dashed" d="M1258 692 C1120 660,920 595,695 510"></path>
        <text class="label" x="785" y="600">1. Yêu cầu đăng nhập</text>

        <path class="arrow-dashed" d="M695 535 C900 608,1110 668,1258 704"></path>
        <text class="label" x="655" y="605">2. Trả Firebase ID Token</text>

        <path class="arrow-thick" d="M1487 792 C1515 700,1515 360,1515 190 C1515 130,1210 105,1095 92"></path>
        <text class="label" x="1390" y="420">3. Gửi API Request + JWT/ID Token</text>

        <path class="arrow-dashed" d="M720 200 C635 255,610 355,607 468"></path>
        <text class="label" x="548" y="415">4. Backend verify token</text>
      </svg>
    </section>
  </main>
</body>
</html>
